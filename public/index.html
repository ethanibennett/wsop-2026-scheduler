<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#111111">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>futurega.me | spring/summer 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script>
    // Set theme + contrast before React mounts to prevent flash of wrong theme
    (function() {
      var t = localStorage.getItem('theme') || 'dark';
      var c = localStorage.getItem('contrast') || 'normal';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.setAttribute('data-contrast', c);
      var meta = document.querySelector('meta[name="theme-color"]');
      var mc = {dark:'#111111',dusk:'#0d1525',light:'#f5f5f5',cloudy:'#cbcbcb'};
      if (meta) meta.setAttribute('content', mc[t] || '#111111');
    })();
    // Force safe area layout for iOS standalone PWA
    (function() {
      var isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
      if (isStandalone) {
        // Detect actual safe area inset — create test element
        var test = document.createElement('div');
        test.style.cssText = 'position:fixed;top:env(safe-area-inset-top,0px);visibility:hidden;pointer-events:none;';
        document.documentElement.appendChild(test);
        var topInset = test.getBoundingClientRect().top;
        document.documentElement.removeChild(test);
        // If env() returned 0, use known iPhone safe area (47px for notch, 34px for home indicator)
        if (topInset < 1) topInset = 47;
        var bottomInset = 34;
        var s = document.createElement('style');
        s.textContent = 'html,body{position:fixed!important;top:0!important;left:0!important;right:0!important;bottom:0!important;overflow:hidden!important;margin:0!important;padding:0!important;background:var(--surface)!important;}#root{position:fixed!important;top:0!important;left:0!important;right:0!important;bottom:0!important;background:var(--surface)!important;overflow:hidden!important;}.app-shell{padding-top:' + topInset + 'px!important;}.content-area{background:var(--bg)!important;}.bottom-nav{height:calc(56px + ' + bottomInset + 'px)!important;padding-bottom:' + bottomInset + 'px!important;}.bottom-nav::after{content:"";position:absolute;left:0;right:0;bottom:-50px;height:50px;background:var(--surface);}';
        document.head.appendChild(s);
      }
    })();
    // Auto-reload on new deploy — checks version every 60s
    (function() {
      var BUILD_VERSION = '20260412b';
      setInterval(function() {
        fetch('/version.txt?t=' + Date.now()).then(function(r) { return r.text(); }).then(function(v) {
          if (v.trim() && v.trim() !== BUILD_VERSION) { window.location.reload(); }
        }).catch(function() {});
      }, 60000);
    })();
  </script>
  <script>
    // Global error handler — surfaces runtime errors visibly during debugging
    window.onerror = function(msg, url, line, col, err) {
      // Ignore cross-origin "Script error" with no details (CDN worker errors, not real bugs)
      if (msg === 'Script error.' && line === 0) return true;
      var el = document.getElementById('startup-error');
      if (!el) {
        el = document.createElement('div');
        el.id = 'startup-error';
        el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#b00;color:#fff;padding:12px 16px;font:13px/1.5 monospace;white-space:pre-wrap;max-height:40vh;overflow:auto';
        document.body.prepend(el);
      }
      el.textContent += msg + ' (line ' + line + ')\n';
    };
    // Also catch unhandled promise rejections (iOS reports these as Script error)
    window.onunhandledrejection = function(e) {
      if (e && e.reason && e.reason.message === 'Script error.') { e.preventDefault(); return; }
    };
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel removed — JSX pre-compiled by esbuild -->
  <script crossorigin src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <link rel="stylesheet" href="/styles.css?v=1774540000">
  <style>
    /* Critical layout — inlined to bypass PWA cache */
    html, body { position: fixed; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; margin: 0; padding: 0; background: var(--surface); }
    #root { position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
    .app-shell {
      padding-top: env(safe-area-inset-top, 0px) !important;
    }
    /* iOS standalone PWA fallback when env() returns 0 */
    @media screen and (display-mode: standalone) {
      .app-shell { padding-top: max(env(safe-area-inset-top, 0px), 47px) !important; }
    }
  </style>
</head>
<body>
  <div id="splash" style="position:fixed;inset:0;z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);transition:opacity 0.4s ease-out;">
    <img src="/splash-icon.svg" alt="" style="width:80px;height:80px;margin-bottom:20px;" />
    <h1 style="font-family:'Libre Baskerville',Georgia,serif;font-size:1.6rem;color:var(--text);letter-spacing:-0.02em;margin:0;">futurega.me</h1>
    <p style="font-family:'Univers Condensed','Univers',sans-serif;font-size:0.8rem;color:var(--text-muted);margin-top:4px;">spring/summer 2026</p>
  </div>
  <div id="root"></div>
  <script>
    // Fade out splash once React renders
    (function() {
      var splash = document.getElementById('splash');
      if (!splash) return;
      var obs = new MutationObserver(function() {
        if (document.getElementById('root').children.length > 0) {
          obs.disconnect();
          setTimeout(function() {
            splash.style.opacity = '0';
            setTimeout(function() { splash.remove(); }, 400);
          }, 1500);
        }
      });
      obs.observe(document.getElementById('root'), { childList: true });
      // Fallback: remove after 3s regardless
      setTimeout(function() {
        if (splash.parentNode) {
          splash.style.opacity = '0';
          setTimeout(function() { splash.remove(); }, 400);
        }
      }, 3000);
    })();
  </script>

  <script src="/js/poker-engine.js?v=20260408f"></script>
  <script src="/js/utils.js?v=20260408f"></script>
  <script src="/js/hand-shorthand.js?v=20260410"></script>
  <script src="/dist/export.js?v=20260408f"></script>
  <script src="/dist/staking.js?v=20260408f"></script>
  <script src="/dist/social.js?v=20260408f"></script>
  <script src="/dist/replayer.js?v=20260408f"></script>
  <script src="/dist/app.js?v=20260408f"></script>
  <script>
    // Kill all service workers and caches — SW caching caused stale deploys
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
      if (window.caches) {
        caches.keys().then(function(names) {
          names.forEach(function(n) { caches.delete(n); });
        });
      }
    }
  </script>
</body>
</html>
