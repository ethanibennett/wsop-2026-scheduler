<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#111111">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>futurega.me | spring/summer 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script>
    // Set theme + contrast before React mounts to prevent flash of wrong theme
    (function() {
      var t = localStorage.getItem('theme') || 'dark';
      var c = localStorage.getItem('contrast') || 'normal';
      document.documentElement.setAttribute('data-theme', t);
      document.documentElement.setAttribute('data-contrast', c);
      var meta = document.querySelector('meta[name="theme-color"]');
      var mc = {dark:'#111111',dusk:'#0d1525',light:'#f5f5f5',cloudy:'#cbcbcb'};
      if (meta) meta.setAttribute('content', mc[t] || '#111111');
    })();
    // Platform detection — sets data-platform attribute for CSS targeting
    (function() {
      var platform = 'web';
      if (window.Capacitor && window.Capacitor.getPlatform) {
        platform = window.Capacitor.getPlatform(); // 'ios' | 'android' | 'web'
      } else {
        var ua = navigator.userAgent || '';
        if (/iPad|iPhone|iPod/.test(ua)) platform = 'ios-web';
        else if (/Android/i.test(ua)) platform = 'android-web';
      }
      document.documentElement.setAttribute('data-platform', platform);
      var isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
      if (isStandalone) document.documentElement.setAttribute('data-standalone', 'true');
    })();
  </script>
  <style>
    /* Critical layout — inlined to bypass PWA cache */
    html, body { position: fixed; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; margin: 0; padding: 0; background: var(--surface); }
    #root { position: fixed; top: 0; left: 0; right: 0; bottom: calc(0px - env(safe-area-inset-bottom, 0px)); }
    .app-shell {
      padding-top: env(safe-area-inset-top, 0px) !important;
      padding-bottom: env(safe-area-inset-bottom, 0px) !important;
    }
    @media screen and (display-mode: standalone) {
      .app-shell { padding-top: max(env(safe-area-inset-top, 0px), 47px) !important; }
    }
  </style>
</head>
<body>
  <div id="splash" style="position:fixed;inset:0;z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);transition:opacity 0.4s ease-out;">
    <img src="/splash-icon.svg" alt="" style="width:80px;height:80px;margin-bottom:20px;" />
    <h1 style="font-family:'Libre Baskerville',Georgia,serif;font-size:1.6rem;color:var(--text);letter-spacing:-0.02em;margin:0;">futurega.me</h1>
    <p style="font-family:'Univers Condensed','Univers',sans-serif;font-size:0.8rem;color:var(--text-muted);margin-top:4px;">spring/summer 2026</p>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Fade out splash once React renders
    (function() {
      var splash = document.getElementById('splash');
      if (!splash) return;
      var obs = new MutationObserver(function() {
        if (document.getElementById('root').children.length > 0) {
          obs.disconnect();
          setTimeout(function() {
            splash.style.opacity = '0';
            setTimeout(function() { splash.remove(); }, 400);
          }, 1500);
        }
      });
      obs.observe(document.getElementById('root'), { childList: true });
      setTimeout(function() {
        if (splash.parentNode) {
          splash.style.opacity = '0';
          setTimeout(function() { splash.remove(); }, 400);
        }
      }, 3000);
    })();
  </script>
</body>
</html>
