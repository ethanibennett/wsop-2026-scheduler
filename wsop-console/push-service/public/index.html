<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WSOP 2027 Console</title>
  <meta name="theme-color" content="#14171C" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Console" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="console">
    <header class="masthead">
      <p class="eyebrow"><span class="suit">&#9824;</span> <span id="phase">Loading phase…</span></p>
      <h1>The Year Plan</h1>
      <p class="sub">Push console &middot; running to WSOP 2027</p>
    </header>

    <section class="arm" aria-live="polite">
      <div class="arm-row">
        <span class="status-dot" id="dot" data-on="false"></span>
        <span class="status-label" id="statusLabel">Notifications off</span>
      </div>
      <button id="enableBtn" class="primary">Enable notifications</button>
      <button id="testBtn" class="ghost" hidden>Send a test push</button>
      <p class="hint" id="hint"></p>
    </section>

    <section class="board">
      <div class="board-head">
        <span class="board-title">Today's nudges</span>
        <span class="board-meta" id="deviceCount"></span>
      </div>
      <ul class="levels" id="levels"></ul>
    </section>

    <footer class="foot">
      <p>Edit the schedule in <code>schedule.js</code>. Times follow the server clock.</p>
    </footer>
  </main>
  <script src="/app.js"></script>
</body>
</html>
