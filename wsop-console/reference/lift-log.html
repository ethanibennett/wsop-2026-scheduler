<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Strength Log — Phase 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#14171C; --surface:#1C2128; --surface-2:#232A33; --line:#2C343E;
    --bone:#E8E4DA; --muted:#8A9099; --felt:#3CA374; --chip:#C8A04E; --rose:#C98AA8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--ink);color:var(--bone);
    font-family:"Inter",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 50px)}
  .wrap{max-width:560px;margin:0 auto;padding:24px 16px 0}

  .eyebrow{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--chip);margin:0 0 8px}
  h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:26px;margin:0 0 4px;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:13px;margin:0 0 18px;line-height:1.45}

  .phasebar{display:flex;gap:8px;margin-bottom:16px;font-size:12px;align-items:center}
  .phasebar span{color:var(--muted);font-family:"JetBrains Mono",monospace;font-size:11px}
  .pbtn{font-family:"JetBrains Mono",monospace;font-size:11px;border:1px solid var(--line);
    background:var(--surface);color:var(--muted);padding:5px 10px;border-radius:999px;cursor:pointer}
  .pbtn.on{color:var(--ink);background:var(--chip);border-color:var(--chip);font-weight:700}

  .tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
  .tab{flex:1;min-width:60px;font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:13px;
    background:var(--surface);border:1px solid var(--line);color:var(--bone);
    padding:9px 6px;border-radius:10px;cursor:pointer;text-align:center;transition:.12s}
  .tab.on{border-color:var(--felt);color:var(--felt)}
  .tab:focus-visible{outline:2px solid var(--chip);outline-offset:2px}

  .datebar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .datebar label{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  input[type=date]{background:var(--surface-2);border:1px solid var(--line);color:var(--bone);
    font-family:"JetBrains Mono",monospace;font-size:13px;padding:7px 10px;border-radius:8px}

  .lift{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
  .lift .ln{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:14px;margin-bottom:2px}
  .lift .last{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);margin-bottom:9px;min-height:14px}
  .lift .last b{color:var(--felt)}
  .inputs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
  .inputs .fld{display:flex;flex-direction:column;gap:3px}
  .inputs label{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .inputs input{background:var(--surface-2);border:1px solid var(--line);color:var(--bone);
    font-family:"JetBrains Mono",monospace;font-size:15px;padding:8px;border-radius:8px;width:100%;text-align:center}
  .inputs input:focus{outline:none;border-color:var(--felt)}

  .prehab{background:var(--surface);border:1px dashed var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
  .prehab .ph-t{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--chip);margin-bottom:9px}
  .chk{display:flex;flex-wrap:wrap;gap:8px}
  .chk button{font-size:12px;font-family:"Inter",sans-serif;background:var(--surface-2);border:1px solid var(--line);
    color:var(--muted);padding:6px 11px;border-radius:999px;cursor:pointer;transition:.1s}
  .chk button.done{color:var(--felt);border-color:var(--felt)}

  .save{width:100%;font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:15px;
    background:var(--felt);color:var(--ink);border:0;padding:14px;border-radius:12px;cursor:pointer;margin-top:4px}
  .save:active{transform:translateY(1px)}
  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:24px;background:var(--surface-2);
    border:1px solid var(--felt);color:var(--bone);font-size:13px;padding:10px 18px;border-radius:10px;
    opacity:0;transition:.25s;pointer-events:none;z-index:9}
  .toast.show{opacity:1}
  .toast.err{border-color:var(--rose)}

  .hist .hlift{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
  .hist .hn{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:13px;margin-bottom:8px}
  .hist .row{display:flex;justify-content:space-between;font-family:"JetBrains Mono",monospace;font-size:12px;
    color:var(--bone);padding:4px 0;border-top:1px solid var(--line)}
  .hist .row .d{color:var(--muted)}
  .hist .empty,.note{color:var(--muted);font-size:13px;line-height:1.5}
  .note{margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Phase 1 · Foundation</p>
  <h1>Strength Log</h1>
  <p class="sub">Log the working set for each lift — the app shows last time so you beat it. <b>Loads &amp; clearance per your surgeon; the knee rule is always no pain.</b></p>

  <div class="phasebar">
    <span>Mode:</span>
    <button class="pbtn" data-mode="preop">Pre-op (light)</button>
    <button class="pbtn on" data-mode="build">Build</button>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab on" data-tab="mon">Mon</button>
    <button class="tab" data-tab="wed">Wed</button>
    <button class="tab" data-tab="fri">Fri</button>
    <button class="tab" data-tab="bench">Bench</button>
    <button class="tab" data-tab="hist">History</button>
  </div>

  <div id="panel"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const hasStore = !!(window.storage && window.storage.get);
let LIFTLOG = {}, BENCH = {}, PREHAB = {};
let TAB = "mon", MODE = "build";

const SESSIONS = {
  mon: { title:"Monday", lifts:[
    {slug:"leg-press", name:"Leg press"},
    {slug:"hip-thrust", name:"Hip thrust"},
    {slug:"machine-chest", name:"Machine / DB chest press"},
    {slug:"cs-row", name:"Chest-supported row"},
    {slug:"pallof", name:"Pallof press"},
  ], prehab:["Calf raises","Step-downs","Glute-med","Face pulls"]},
  wed: { title:"Wednesday", lifts:[
    {slug:"split-squat", name:"Bulgarian split squat"},
    {slug:"leg-curl", name:"Leg curl + back ext"},
    {slug:"incline-db", name:"Incline DB press"},
    {slug:"lat-pulldown", name:"Lat pulldown"},
    {slug:"dead-bug", name:"Dead bug"},
  ], prehab:["Seated calf","Spanish squat / TKE","Foot work","Face pulls"]},
  fri: { title:"Friday", lifts:[
    {slug:"goblet-squat", name:"Goblet / hack squat"},
    {slug:"hinge-fri", name:"Trap-bar DL (build) / Leg curl (pre-op)"},
    {slug:"db-shoulder", name:"DB shoulder press"},
    {slug:"cable-row", name:"Seated cable row"},
    {slug:"bird-dog", name:"Bird dog"},
  ], prehab:["Calf raises","Step-downs","Face pulls"]},
};
const BENCHMARKS = [
  {slug:"pushups", name:"Push-ups (max)", unit:"reps"},
  {slug:"pullups", name:"Pull-ups (max)", unit:"reps"},
  {slug:"plank", name:"Plank hold", unit:"sec"},
  {slug:"squat-hold", name:"Deep-squat hold", unit:"sec"},
  {slug:"toe-touch", name:"Toe-touch reach", unit:"cm +/-"},
  {slug:"bodyweight", name:"Bodyweight", unit:"lb"},
  {slug:"waist", name:"Waist", unit:"in"},
];

const $ = (s,el=document)=>el.querySelector(s);
const today = ()=> new Date().toISOString().slice(0,10);
function lastOf(slug){ const a=LIFTLOG[slug]; return (a&&a.length)?a[a.length-1]:null; }
function fmt(e){ if(!e) return ""; const p=[]; if(e.w) p.push(e.w+"lb"); if(e.reps) p.push("×"+e.reps); const s=p.join(" "); return (e.sets?e.sets+" sets ":"")+s; }

async function load(){
  if(hasStore){
    try{ const r=await window.storage.get("liftlog"); if(r&&r.value) LIFTLOG=JSON.parse(r.value); }catch(e){}
    try{ const r=await window.storage.get("benchmarks"); if(r&&r.value) BENCH=JSON.parse(r.value); }catch(e){}
  }
  render();
}
async function persist(key,obj){
  if(!hasStore){ toast("Saved (session only — open in the app to persist)"); return true; }
  try{ const r=await window.storage.set(key, JSON.stringify(obj)); if(!r){ toast("Save failed",true); return false; } toast("Saved ✓"); return true; }
  catch(e){ toast("Save failed",true); return false; }
}
let tt;
function toast(msg,err){ const t=$("#toast"); t.textContent=msg; t.className="toast show"+(err?" err":""); clearTimeout(tt); tt=setTimeout(()=>t.className="toast",1800); }

function render(){
  document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("on", b.dataset.tab===TAB));
  document.querySelectorAll(".pbtn").forEach(b=>b.classList.toggle("on", b.dataset.mode===MODE));
  const p=$("#panel");
  if(TAB==="bench") return renderBench(p);
  if(TAB==="hist") return renderHist(p);
  renderSession(p, TAB);
}

function renderSession(p, day){
  const S=SESSIONS[day];
  let html = `<div class="datebar"><label>Session date</label><input type="date" id="sdate" value="${today()}"></div>`;
  if(MODE==="preop") html += `<p class="note" style="margin-bottom:12px">Pre-op: light, supported, submaximal — groove the pattern, no heavy bracing or breath-holding. Core stays gentle (stop at any pull near the site).</p>`;
  S.lifts.forEach(l=>{
    const last=lastOf(l.slug);
    html += `<div class="lift" data-slug="${l.slug}">
      <div class="ln">${l.name}</div>
      <div class="last">${last?`last: <b>${fmt(last)}</b> · ${last.date}`:"last: —"}</div>
      <div class="inputs">
        <div class="fld"><label>Weight</label><input inputmode="decimal" data-f="w" placeholder="${last&&last.w?last.w:"—"}"></div>
        <div class="fld"><label>Reps</label><input inputmode="numeric" data-f="reps" placeholder="${last&&last.reps?last.reps:"—"}"></div>
        <div class="fld"><label>Sets</label><input inputmode="numeric" data-f="sets" placeholder="${last&&last.sets?last.sets:"—"}"></div>
      </div>
    </div>`;
  });
  const pset = PREHAB[day]||{};
  html += `<div class="prehab"><div class="ph-t">Prehab — tick when done</div><div class="chk" id="chk">`;
  S.prehab.forEach((x,i)=>{ html += `<button data-i="${i}" class="${pset[i]?"done":""}">${x}</button>`; });
  html += `</div></div><button class="save" id="saveBtn">Save ${S.title}'s session</button>`;
  p.innerHTML=html;

  $("#chk").addEventListener("click",e=>{ const b=e.target.closest("button"); if(!b)return;
    const i=b.dataset.i; pset[i]=!pset[i]; PREHAB[day]=pset; b.classList.toggle("done"); });
  $("#saveBtn").addEventListener("click",()=>saveSession(day));
}

async function saveSession(day){
  const date=$("#sdate").value||today();
  let n=0;
  document.querySelectorAll(`#panel .lift`).forEach(card=>{
    const slug=card.dataset.slug;
    const w=$('[data-f=w]',card).value.trim();
    const reps=$('[data-f=reps]',card).value.trim();
    const sets=$('[data-f=sets]',card).value.trim();
    if(w||reps||sets){ (LIFTLOG[slug]=LIFTLOG[slug]||[]).push({date,w,reps,sets}); n++; }
  });
  if(!n){ toast("Nothing entered yet",true); return; }
  const ok=await persist("liftlog",LIFTLOG);
  if(ok) render();
}

function renderBench(p){
  let html=`<div class="datebar"><label>Date</label><input type="date" id="bdate" value="${today()}"></div>`;
  BENCHMARKS.forEach(b=>{
    const a=BENCH[b.slug]; const last=(a&&a.length)?a[a.length-1]:null;
    html+=`<div class="lift" data-slug="${b.slug}">
      <div class="ln">${b.name}</div>
      <div class="last">${last?`last: <b>${last.value} ${b.unit}</b> · ${last.date}`:"last: —"}</div>
      <div class="inputs" style="grid-template-columns:1fr"><div class="fld"><label>${b.unit}</label><input inputmode="decimal" data-bf="${b.slug}" placeholder="${last?last.value:"—"}"></div></div>
    </div>`;
  });
  html+=`<button class="save" id="saveB">Save benchmarks</button>
    <p class="note">Retest at each phase boundary (per the goals doc). The scale understates fat loss while you build — read weight + waist together.</p>`;
  p.innerHTML=html;
  $("#saveB").addEventListener("click",saveBench);
}
async function saveBench(){
  const date=$("#bdate").value||today(); let n=0;
  document.querySelectorAll("[data-bf]").forEach(inp=>{
    const v=inp.value.trim(); if(v){ const s=inp.dataset.bf; (BENCH[s]=BENCH[s]||[]).push({date,value:v}); n++; }
  });
  if(!n){ toast("Nothing entered yet",true); return; }
  const ok=await persist("benchmarks",BENCH); if(ok) render();
}

function renderHist(p){
  const slugs=Object.keys(LIFTLOG).filter(s=>LIFTLOG[s]&&LIFTLOG[s].length);
  if(!slugs.length){ p.innerHTML=`<p class="hist empty">No sessions logged yet. Your lift history and progression will build here.</p>`; return; }
  const nameFor={}; Object.values(SESSIONS).forEach(S=>S.lifts.forEach(l=>nameFor[l.slug]=l.name));
  let html=`<div class="hist">`;
  slugs.forEach(s=>{
    const a=LIFTLOG[s].slice().reverse();
    html+=`<div class="hlift"><div class="hn">${nameFor[s]||s}</div>`;
    a.slice(0,8).forEach(e=>{ html+=`<div class="row"><span class="d">${e.date}</span><span>${fmt(e)||"—"}</span></div>`; });
    html+=`</div>`;
  });
  html+=`</div>`;
  p.innerHTML=html;
}

document.getElementById("tabs").addEventListener("click",e=>{ const b=e.target.closest(".tab"); if(!b)return; TAB=b.dataset.tab; render(); });
document.querySelector(".phasebar").addEventListener("click",e=>{ const b=e.target.closest(".pbtn"); if(!b)return; MODE=b.dataset.mode; render(); });

load();
</script>
</body>
</html>
